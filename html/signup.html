<!DOCTYPE html>
<html>
        <head>
            <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
        <!--custom styles -->
        <link rel="stylesheet" href="css/signup.css">

        <!--icon styles-->

        <!--google fonts-->
        <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;1,100;1,200;1,300;1,400;1,500&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"> 
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Peta&family=Syne&display=swap" rel="stylesheet"> 

           <!--fontawesome icons-->   
           <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

            <title>SHELF: Sign Up</title>
        </head>

    <body>

        

        <div class="sign-up-container">
            <h1 class="user-icon"><i class="fa fa-user-circle"></i></h1>
            <h2>Sign Up</h2>
            <p class="sign-up-lead">Join us today to gain access to millions of books to read anywhere you are in the world.</p>
           <form action="" method="post">
            <label for="name">Name</label>
            <input type="text" class="form-input" placeholder="enter your name" id="name">

            <label for="email">Email</label>
            <input type="email" class="form-input" placeholder="enter your email" id="email">

            <label for="password">Password</label>
            <input type="password" class="form-input" placeholder="enter your password" id="password">

            <label for="confirm-password">Confirm Password</label>
            <input type="password" class="form-input" placeholder="confirm password" id="confirm-password">

            <button class="sign-up-btn" type="submit" name="sign-up">Sign Up</button>

            <p class="log-in-text"><a href="login.html">If you already have an account Log In</a></p>
           </form>
        </div>

    </body>

</html>
